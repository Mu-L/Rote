name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - path: server
          - path: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: bun install

      - name: Run ESLint
        working-directory: ${{ matrix.path }}
        run: bun run lint

      - name: Build
        if: matrix.path == 'web'
        working-directory: ${{ matrix.path }}
        run: bun run build

      - name: Type check
        working-directory: ${{ matrix.path }}
        run: bun run build

  server-tests:
    runs-on: ubuntu-latest
    needs: lint-and-build
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: rote
          POSTGRES_PASSWORD: rote_password_123
          POSTGRES_DB: rote
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: server
        run: bun install

      - name: Run tests
        working-directory: server
        env:
          POSTGRESQL_URL: postgresql://rote:rote_password_123@localhost:5432/rote
        run: bun run test
