name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - path: server
            node-version: '1.x'  # Bun
          - path: web
            node-version: '20.x'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        if: matrix.path == 'server'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: matrix.path == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          if [ "${{ matrix.path }}" == "server" ]; then
            bun install
          else
            npm install
          fi

      - name: Run ESLint
        working-directory: ${{ matrix.path }}
        run: |
          if [ "${{ matrix.path }}" == "server" ]; then
            bun run lint
          else
            npm run lint
          fi

      - name: Build
        if: matrix.path == 'web'
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Type check
        working-directory: ${{ matrix.path }}
        run: |
          if [ "${{ matrix.path }}" == "server" ]; then
            bun run build
          else
            npx tsc --noEmit
          fi

  server-tests:
    runs-on: ubuntu-latest
    needs: lint-and-build
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: server
        run: bun install

      - name: Run tests
        working-directory: server
        run: bun run test
